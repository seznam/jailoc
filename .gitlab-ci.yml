stages:
  - build
  - test
  - release
  - image-push

variables:
  # TODO: update image path if using custom registry
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}/jailoc-base

build:
  stage: build
  image: golang:1.24
  script:
    - go build -ldflags "-X main.version=${CI_COMMIT_TAG:-dev} -X main.commit=${CI_COMMIT_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" ./cmd/jailoc
  artifacts:
    paths:
      - jailoc
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

test:
  stage: test
  image: golang:1.24
  script:
    - go test ./...
    - go vet ./...
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

integration-test:
  stage: test
  image: golang:1.24
  services:
    - docker:dind
  before_script:
    - apt-get update && apt-get install -y docker.io
  script:
    - go test -tags=integration ./internal/...
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  allow_failure: true

release:
  stage: release
  image: goreleaser/goreleaser
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - goreleaser release --clean
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

push-base-image:
  stage: image-push
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_TAG} -t ${DOCKER_IMAGE}:latest -f Dockerfile .
    - docker push ${DOCKER_IMAGE}:${CI_COMMIT_TAG}
    - docker push ${DOCKER_IMAGE}:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  needs:
    - release
